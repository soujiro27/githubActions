name: "hola mundo"
on:
  workflow_dispatch:
    push:
      branches:
        - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: "22"
      - name: "saludo js"
        run: "node index.js"