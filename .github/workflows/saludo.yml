name: "hola mundo"
on: [push]
jobs:
  saludo:
    runs-on: ubuntu-latest
    steps:
      - name: clone 
        uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with: 
          node-version: "22"
      - name: definir variable
        run: echo "USERNAME=${{ github.actor }}" 
      - name: "saludo js"
        run: "node index.js"